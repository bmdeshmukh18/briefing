<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NSE Pulse — daily NSE market briefing and call ledger">
  <title>NSE Pulse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@1,400;1,500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="masthead" role="banner">
  <a class="brand" href="#/">
    <svg class="brand-pulse" viewBox="0 0 28 16" aria-hidden="true" width="26" height="15">
      <path d="M0 10 L5 10 L8 3 L11 14 L14 1 L17 12 L20 10 L28 10"
            stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="brand-name">NSE&nbsp;Pulse</span>
    <span class="brand-sub">call ledger</span>
  </a>

  <nav class="date-nav" aria-label="Briefing date">
    <button id="nav-prev" class="nav-arrow" aria-label="Previous briefing" disabled>‹</button>
    <select id="date-nav" aria-label="Select briefing date">
      <option disabled selected>Loading…</option>
    </select>
    <button id="nav-next" class="nav-arrow" aria-label="Next briefing" disabled>›</button>
  </nav>

  <div class="masthead-right">
    <span id="accuracy-chip" class="accuracy-chip" hidden></span>
    <a href="ops-4f21/" class="console-link">Console</a>
  </div>
</header>

<main id="main-content" role="main">
  <div id="skeleton" class="skeleton-wrap" aria-hidden="true">
    <div class="skeleton skel-rail"></div>
    <div class="skeleton skel-line w-40"></div>
    <div class="skel-grid">
      <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
    </div>
    <div class="skeleton skel-line w-75"></div>
    <div class="skeleton skel-line w-60"></div>
  </div>

  <div id="root" hidden></div>
  <div id="error-root" class="error-root" hidden></div>
</main>

<footer class="site-footer">
  briefing arrives ~7 PM IST via the ingestion pipeline · calls verified next session · not investment advice
</footer>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
